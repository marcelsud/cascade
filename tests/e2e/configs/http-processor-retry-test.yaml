input:
  generate:
    count: 2
    interval: 100
    template:
      testId: "{{index}}"
      testType: "retry-test-{{index}}"

pipeline:
  processors:
    # Persistent 503 — should retry max_retries times after the initial attempt
    - http:
        url: "http://localhost:8081/status/503?testId={{content.testId}}"
        method: "GET"
        result_key: "retryResponse"
        timeout: 5000
        max_retries: 2

    - log:
        level: "info"
        include_content: true

output:
  capture:
    max_messages: 2
