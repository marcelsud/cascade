# Redis Pub/Sub Producer - Generates messages and publishes to Redis channel
input:
  generate:
    count: 5
    interval: 100
    template:
      orderId: "order-{{index}}"
      productId: "prod-{{index}}"
      timestamp: "{{timestamp}}"
      customer:
        name: "Customer {{index}}"
        email: "customer{{index}}@test.com"

pipeline:
  processors:
    - metadata:
        add_timestamp: true

output:
  redis_pubsub:
    host: localhost
    port: 6380
    channel: "test-channel"
