input:
  generate:
    count: 3
    interval: 100
    template:
      user:
        id: "user-{{index}}"
        name: "Test User {{index}}"
      action: "action-{{index}}"
      items:
        - price: 10
        - price: 20
        - price: 30

pipeline:
  processors:
    # Test URL with multiple template variables
    - http:
        url: "http://localhost:8081/get?userId={{content.user.id}}&action={{content.action}}&index={{content.user.name}}"
        method: "GET"
        result_key: "urlTemplateResponse"
        timeout: 5000

    # Test POST with JSONata body template
    - http:
        url: "http://localhost:8081/post"
        method: "POST"
        headers:
          Content-Type: "application/json"
        body: |
          {
            "userId": "{{content.user.id}}",
            "userName": "{{content.user.name}}",
            "action": "{{content.action}}",
            "totalPrice": "{{content.items.price ~> $sum()}}",
            "itemCount": "{{content.items ~> $count()}}"
          }
        result_key: "bodyTemplateResponse"
        timeout: 5000

    - assert:
        condition: metadata.urlTemplateResponse.args.userId = content.user.id and metadata.urlTemplateResponse.args.action = content.action and metadata.urlTemplateResponse.args.index = content.user.name and metadata.bodyTemplateResponse.json.userId = content.user.id and metadata.bodyTemplateResponse.json.userName = content.user.name and metadata.bodyTemplateResponse.json.action = content.action and metadata.bodyTemplateResponse.json.totalPrice = "60" and metadata.bodyTemplateResponse.json.itemCount = "3"
        error: HTTP template response mismatch

    - log:
        level: "info"
        include_content: true

output:
  capture:
    max_messages: 3
