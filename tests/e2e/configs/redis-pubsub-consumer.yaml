# Redis Pub/Sub Consumer - Subscribes to channel and captures messages
input:
  redis_pubsub:
    host: localhost
    port: 6380
    channels:
      - "test-channel"

pipeline:
  processors:
    - log:
        level: "info"
        include_content: true
    - metadata:
        add_timestamp: true

output:
  capture:
    max_messages: 5
