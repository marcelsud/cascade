input:
  generate:
    count: 2
    interval: 100
    template:
      userId: "{{index}}"
      action: "test-action-{{index}}"

pipeline:
  processors:
    - http:
        url: "http://localhost:8081/uuid?testId={{content.userId}}"
        method: "GET"
        result_key: "enrichment"
        timeout: 5000
    - assert:
        condition: metadata.enrichment.uuid = "e2e-uuid" and metadata.enrichment.testId = content.userId
        error: HTTP enrichment response mismatch
    - log:
        level: "info"
        include_content: true

output:
  capture:
    max_messages: 2
