input:
  generate:
    count: 2
    interval: 100
    template:
      testId: "{{index}}"
      errorType: "error-test-{{index}}"

pipeline:
  processors:
    # Flaky 500 once then 200 per testId (proves retryable 5xx recovery)
    - http:
        url: "http://localhost:8081/flaky/500?testId={{content.testId}}"
        method: "GET"
        result_key: "error500Response"
        timeout: 5000
        max_retries: 1

    # Logical 404 must fail without retry after flaky recovery
    - http:
        url: "http://localhost:8081/status/404?testId={{content.testId}}"
        method: "GET"
        result_key: "error404Response"
        timeout: 5000
        max_retries: 1

    - log:
        level: "info"
        include_content: true

output:
  capture:
    max_messages: 2
