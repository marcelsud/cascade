input:
  generate:
    count: 3
    interval: 100
    template:
      orderId: "{{index}}"
      product: "widget-{{index}}"
      quantity: "{{index}}"

pipeline:
  processors:
    - http:
        url: "http://localhost:8081/post"
        method: "POST"
        headers:
          Content-Type: "application/json"
        body: |
          {
            "order": "{{content.orderId}}",
            "product": "{{content.product}}",
            "qty": {{$number(content.quantity) + 1}}
          }
        result_mapping: |
          {
            "orderId": content.orderId,
            "product": content.product,
            "quantity": $number(content.quantity) + 1,
            "apiResponse": http_response
          }
        timeout: 5000
    - assert:
        condition: content.product = ("widget-" & content.orderId) and content.quantity = $number(content.orderId) + 1 and content.apiResponse.json.order = content.orderId and content.apiResponse.json.product = content.product and content.apiResponse.json.qty = content.quantity
        error: HTTP POST response mapping mismatch
    - log:
        level: "info"
        include_content: true

output:
  capture:
    max_messages: 3
