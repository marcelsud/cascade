input:
  generate:
    count: 3
    interval: 100
    template:
      testId: "{{index}}"
      testType: "auth-test-{{index}}"

pipeline:
  processors:
    # Test 1: Bearer token authentication
    - http:
        url: "http://localhost:8081/bearer?testId={{content.testId}}"
        method: "GET"
        auth:
          type: bearer
          token: "test-secret-token-12345"
        result_key: "bearerAuth"
        timeout: 5000

    # Test 2: Custom headers
    - http:
        url: "http://localhost:8081/headers?testId={{content.testId}}"
        method: "GET"
        headers:
          X-Api-Key: "my-api-key-67890"
          X-Request-ID: "test-{{content.testId}}"
        result_key: "customHeaders"
        timeout: 5000

    # Test 3: Basic authentication
    - http:
        url: "http://localhost:8081/basic-auth/testuser/testpass?testId={{content.testId}}"
        method: "GET"
        auth:
          type: basic
          username: "testuser"
          password: "testpass"
        result_key: "basicAuth"
        timeout: 5000

    - assert:
        condition: metadata.bearerAuth.authenticated = true and metadata.bearerAuth.token = "test-secret-token-12345" and metadata.bearerAuth.testId = content.testId and $lookup(metadata.customHeaders.headers, "x-api-key") = "my-api-key-67890" and $lookup(metadata.customHeaders.headers, "x-request-id") = ("test-" & content.testId) and metadata.customHeaders.testId = content.testId and metadata.basicAuth.authenticated = true and metadata.basicAuth.user = "testuser" and metadata.basicAuth.testId = content.testId
        error: HTTP authentication response mismatch

    - log:
        level: "info"
        include_content: true

output:
  capture:
    max_messages: 3
