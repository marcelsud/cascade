version: "3.8"

services:
  http-observer:
    image: node:22-alpine
    container_name: e2e-http-observer
    command: ["node", "/app/http-test-server.mjs"]
    volumes:
      - ../../helpers/http-test-server.mjs:/app/http-test-server.mjs:ro
    ports:
      - "8081:8081"
    environment:
      - PORT=8081
      - HOST=0.0.0.0
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 2s
      timeout: 3s
      retries: 15
      start_period: 2s
    networks:
      - e2e-network

networks:
  e2e-network:
    driver: bridge
